<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background circle with smooth dark-blue/indigo gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b" />
      <stop offset="50%" stop-color="#312e81" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#facc15" />
      <stop offset="100%" stop-color="#eab308" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)" stroke="#312e81" stroke-width="8" />
  
  <!-- Delmi Symbol: Sleek geometric "D" monogram combined with a power loop / circuit trace -->
  <g transform="translate(256, 256)" filter="url(#glow)">
    <!-- Outer loop of D -->
    <path d="M -80,-120 L 10,-120 A 120,120 0 0,1 10,120 L -80,120 Z" fill="none" stroke="url(#logoGrad)" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Inner circuit triangle/lightning trace representing electronics -->
    <path d="M -80,-60 L -20,0 L -80,60" fill="none" stroke="#60a5fa" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" />
    <circle cx="-20" cy="0" r="14" fill="#60a5fa" />
  </g>
</svg>